<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Student Exam Performance Indicator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 30px 15px;
        }

        .container {
            width: 100%;
            max-width: 750px;
        }

        .card {
            background: #ffffff;
            border-radius: 20px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.2);
            padding: 35px 30px;
        }

        .title {
            text-align: center;
            margin-bottom: 10px;
            color: #1e3c72;
            font-size: 32px;
            font-weight: bold;
        }

        .subtitle {
            text-align: center;
            margin-bottom: 30px;
            color: #555;
            font-size: 16px;
        }

        form {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 18px 20px;
        }

        .full-width {
            grid-column: 1 / -1;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        label {
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
            font-size: 14px;
        }

        .form-control {
            padding: 12px 14px;
            border: 1px solid #ccc;
            border-radius: 10px;
            font-size: 15px;
            outline: none;
            transition: 0.3s ease;
            background-color: #f9f9f9;
        }

        .form-control:focus {
            border-color: #2a5298;
            box-shadow: 0 0 0 3px rgba(42, 82, 152, 0.15);
            background-color: #fff;
        }

        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s ease;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(42, 82, 152, 0.25);
        }

        .result-box {
            margin-top: 25px;
            padding: 18px;
            border-radius: 12px;
            background: #f4f8ff;
            border-left: 5px solid #2a5298;
            text-align: center;
        }

        .result-box h2 {
            color: #1e3c72;
            font-size: 22px;
            margin-bottom: 6px;
        }

        .result-box p {
            font-size: 18px;
            color: #333;
            font-weight: bold;
        }

        @media (max-width: 768px) {
            form {
                grid-template-columns: 1fr;
            }

            .title {
                font-size: 26px;
            }

            .card {
                padding: 25px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1 class="title">Student Exam Performance Indicator</h1>
            <p class="subtitle">Enter the student details below to predict the Maths score</p>

            <form action="{{ url_for('predict_datapoint') }}" method="post">

                <div class="form-group">
                    <label for="gender">Gender</label>
                    <select class="form-control" name="gender" id="gender" required>
                        <option selected disabled value="">Select your Gender</option>
                        <option value="male">Male</option>
                        <option value="female">Female</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="ethnicity">Race or Ethnicity</label>
                    <select class="form-control" name="ethnicity" id="ethnicity" required>
                        <option selected disabled value="">Select Ethnicity</option>
                        <option value="group A">Group A</option>
                        <option value="group B">Group B</option>
                        <option value="group C">Group C</option>
                        <option value="group D">Group D</option>
                        <option value="group E">Group E</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="parental_level_of_education">Parental Level of Education</label>
                    <select class="form-control" name="parental_level_of_education" id="parental_level_of_education" required>
                        <option selected disabled value="">Select Parent Education</option>
                        <option value="associate's degree">Associate's degree</option>
                        <option value="bachelor's degree">Bachelor's degree</option>
                        <option value="high school">High school</option>
                        <option value="master's degree">Master's degree</option>
                        <option value="some college">Some college</option>
                        <option value="some high school">Some high school</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="lunch">Lunch Type</label>
                    <select class="form-control" name="lunch" id="lunch" required>
                        <option selected disabled value="">Select Lunch Type</option>
                        <option value="free/reduced">Free/Reduced</option>
                        <option value="standard">Standard</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="test_preparation_course">Test Preparation Course</label>
                    <select class="form-control" name="test_preparation_course" id="test_preparation_course" required>
                        <option selected disabled value="">Select Test Course</option>
                        <option value="none">None</option>
                        <option value="completed">Completed</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="reading_score">Reading Score out of 100</label>
                    <input
                        class="form-control"
                        type="number"
                        name="reading_score"
                        id="reading_score"
                        placeholder="Enter Reading Score"
                        min="0"
                        max="100"
                        required
                    />
                </div>

                <div class="form-group full-width">
                    <label for="writing_score">Writing Score out of 100</label>
                    <input
                        class="form-control"
                        type="number"
                        name="writing_score"
                        id="writing_score"
                        placeholder="Enter Writing Score"
                        min="0"
                        max="100"
                        required
                    />
                </div>

                <div class="form-group full-width">
                    <input class="btn" type="submit" value="Predict Maths Score" />
                </div>
            </form>

            <div class="result-box">
                <h2>Prediction Result</h2>
                <p>{{ results }}</p>
            </div>
        </div>
    </div>
</body>
</html>
